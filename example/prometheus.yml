global:
  scrape_interval: 2s # Собираем метрики часто для наглядности

scrape_configs:
  - job_name: 'go-microservice'
    static_configs:
      # host.docker.internal работает на Mac/Windows.
      # Для Linux замените на IP вашего хоста (например, 172.17.0.1:8080)
      - targets: ['host.docker.internal:8080']
